# Pages CMS configuration — defines the friendly editor UI at
# https://app.pagescms.org/PHD-Center/AsPEN
#
# Reference: https://pagescms.org/docs/configuration/
#
# After editing this file, the change takes effect on next page refresh in the CMS.

content:
  # ────────────────────────────────────────────────────────────────
  # Tabular data (top-level JSON arrays) — edited as friendly tables
  # ────────────────────────────────────────────────────────────────

  - name: databases
    label: Databases
    type: file
    path: src/data/databases.json
    list: true
    fields:
      - { name: country,  label: Country,                 type: string, required: true }
      - { name: code,     label: "ISO code (e.g. TW, KR)", type: string }
      - { name: city,     label: City,                    type: string }
      - { name: lat,      label: Latitude,                type: number, options: { step: 0.0001 } }
      - { name: lng,      label: Longitude,               type: number, options: { step: 0.0001 } }
      - { name: name,     label: Database name,           type: string, required: true }
      - { name: type,     label: "Type (Claims / EHR / Biobank / …)", type: string }
      - { name: coverage, label: Coverage,                type: string }
      - { name: notes,    label: Notes,                   type: text }
      - { name: since,    label: "Data start year",       type: number, options: { step: 1 } }
      - { name: popM,     label: "Population covered (millions)", type: number, options: { step: 0.1 } }
      - { name: lagMonths, label: "Data lag (months)",    type: number, options: { step: 0.5 } }
      - name: features
        label: "Data scope (multi-select)"
        type: select
        options:
          multiple: true
          values:
            - { value: rx,        label: "Prescriptions" }
            - { value: dx,        label: "Diagnoses" }
            - { value: labs,      label: "Lab results" }
            - { value: imaging,   label: "Imaging" }
            - { value: mortality, label: "Mortality linkage" }
            - { value: cancer,    label: "Cancer-registry linkage" }
            - { value: pregnancy, label: "Birth / pregnancy linkage" }
            - { value: genomics,  label: "Genomics / biobank linkage" }

  - name: publications
    label: Publications
    type: file
    path: src/data/publications.json
    list: true
    fields:
      - { name: year,    label: Year,    type: number, required: true }
      - { name: authors, label: Authors, type: text,   required: true }
      - { name: title,   label: Title,   type: text,   required: true }
      - { name: journal, label: Journal, type: string }
      - { name: doi,      label: DOI,                                   type: string }
      - { name: pmid,     label: PMID,                                  type: string }
      - { name: pmcid,    label: "PMCID (for free PMC full text)",      type: string }
      - { name: fulltext, label: "Full-text URL (if not on PMC)",       type: string }
      - name: tags
        label: Tags
        type: string
        list: true
      - name: theme
        label: "Theme (primary — mutually exclusive)"
        type: select
        options:
          values:
            - { value: methods-infrastructure, label: "Infrastructure" }
            - { value: neuropsychiatric,       label: "Neuropsychiatry" }
            - { value: diabetes-cardiometabolic, label: "Diabetes" }
            - { value: pregnancy-paediatric,   label: "Pregnancy & Paediatrics" }
            - { value: pain-opioids,           label: "Pain & Opioids" }
            - { value: oncology-endocrine,     label: "Oncology" }
            - { value: older-adults,           label: "Older adults" }
            - { value: cardiovascular,         label: "Cardiovascular diseases" }
            - { value: infection,              label: "Infection & Vaccine" }
            - { value: utilisation,            label: "Policy & Utilisation" }

  - name: events
    label: Events (calendar)
    type: file
    path: src/data/events.json
    list: true
    fields:
      - { name: date,        label: "Start date (YYYY-MM-DD)", type: date, required: true }
      - { name: endDate,     label: "End date (multi-day events only)", type: date }
      - { name: title,       label: Title,                     type: text, required: true }
      - name: type
        label: Type
        type: select
        options:
          values:
            - { value: conference, label: "Conference" }
            - { value: deadline,   label: "Deadline / submission" }
            - { value: webinar,    label: "Webinar / teleconference" }
            - { value: training,   label: "Training / workshop" }
            - { value: other,      label: "Other" }
      - { name: location,    label: Location,                  type: string }
      - { name: url,         label: "URL (registration / info)", type: string }
      - { name: description, label: Description,               type: text }

  # ────────────────────────────────────────────────────────────────
  # Markdown collections — each entry is one .md file
  # ────────────────────────────────────────────────────────────────

  - name: spotlight
    label: Spotlight features
    type: collection
    path: src/content/spotlight
    filename: "{primary}.md"
    view:
      fields: [title, date]
      primary: title
      sort: [date]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date,  label: Date,  type: date,   required: true }
      - { name: body,  label: Body,  type: rich-text }

  - name: activities
    label: AsPEN studies (Activities)
    type: collection
    path: src/content/activities
    filename: "{primary}.md"
    view:
      fields: [title, year, order]
      primary: title
      sort: [order]
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: year,  label: Year,  type: number }
      - { name: order, label: "Display order (lower first)", type: number }
      - { name: body,  label: Body,  type: rich-text }

  # ────────────────────────────────────────────────────────────────
  # Files you can edit as raw text (advanced — for theming / config)
  # ────────────────────────────────────────────────────────────────

  - name: styles
    label: "Theme: brand colours (advanced)"
    type: file
    path: src/styles/globals.css
    fields:
      - name: body
        label: CSS content
        type: code
        options: { language: css }

  - name: readme
    label: README
    type: file
    path: README.md
    fields:
      - name: body
        label: README content
        type: rich-text

media:
  input: public/images
  output: /AsPEN/images   # served path; matches astro `base`

settings:
  content:
    merge: true
