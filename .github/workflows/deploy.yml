name: Deploy to GitHub Pages and Synology NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ──────────────────────────────────────────
      # Build #1 — for the NAS (apex domain, base '/')
      # ──────────────────────────────────────────
      - name: Build for aspensig.asia (NAS)
        run: npm run build

      - name: Install Rclone
        run: sudo -v ; curl https://rclone.org/install.sh | sudo bash
      - name: Deploy to NCKU PHDc NAS via WebDAV
        env:
          WEBDAV_PASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          OBSCURED_PASS=$(rclone obscure "$WEBDAV_PASS")
          # --ignore-times forces re-upload every file: the NAS WebDAV
          # doesn't preserve modtimes and doesn't expose MD5 checksums,
          # so rclone falls back to size-only comparison and otherwise
          # silently skips HTML whose byte length happens to be unchanged
          # while its internal CSS hash refs differ → stale-asset 404s.
          rclone sync ./dist :webdav:/AsPEN.sig \
            --webdav-url="https://dev.aspensig.asia" \
            --webdav-user="aspen-git" \
            --webdav-pass="$OBSCURED_PASS" \
            --webdav-vendor="other" \
            --ignore-times

      # ──────────────────────────────────────────
      # Build #2 — for GitHub Pages mirror (subpath base '/AsPEN/')
      # ──────────────────────────────────────────
      - name: Build for GitHub Pages
        env:
          DEPLOY_TARGET: ghpages
        run: |
          rm -rf dist
          npm run build

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
