name: Deploy to GitHub Pages and Synology NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # ==========================================
      # 同步資料到PHDC中心
      # ==========================================
      - name: Install Rclone
        run: sudo -v ; curl https://rclone.org/install.sh | sudo bash
      - name: Deploy to NCKU PHDc NAS via WebDAV
        env:
          WEBDAV_PASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          OBSCURED_PASS=$(rclone obscure "$WEBDAV_PASS")
          # 同步指令
          # --ignore-times: force re-upload every file regardless of size/mtime.
          # The NAS WebDAV doesn't preserve modtimes and doesn't expose MD5
          # checksums, so rclone falls back to size-only comparison, which
          # silently skipped HTML files whose byte length happened to be
          # unchanged but whose internal CSS hash refs differed (resulting in
          # stale HTML pointing at deleted CSS files → broken pages). The
          # bandwidth cost is trivial (~30 small files) and avoids the whole
          # class of stale-asset bugs.
          rclone sync ./dist :webdav:/AsPEN.sig \
            --webdav-url="https://dev.aspensig.asia" \
            --webdav-user="aspen-git" \
            --webdav-pass="$OBSCURED_PASS" \
            --webdav-vendor="other" \
            --ignore-times

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
